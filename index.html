<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>70s Forced Awake</title>
    <style>
        /* Black but slightly "noisy" background to trick the GPU */
        body { background: #000; color: #fff; text-align: center; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        #timer { font-size: 110px; font-weight: bold; color: #34C759; text-shadow: 0 0 20px rgba(52, 199, 89, 0.2); }
        .btn { padding: 25px; width: 85%; font-size: 22px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; z-index: 10; margin: 10px auto; }
        #startBtn { background: #007AFF; color: white; }
        #stopBtn { background: #FF3B30; color: white; display: none; }
        #info { font-size: 12px; color: #444; margin-top: 10px; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div id="ui">
        <div id="timer">01:10</div>
        <button id="startBtn" class="btn" onclick="engageNuclearBypass()">START ALARM</button>
        <button id="stopBtn" class="btn" onclick="location.reload()">STOP & RESET</button>
        <div id="info">Screen will stay ON (Visible Force Active)</div>
    </div>

    <audio id="silent" src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" loop></audio>

    <script>
        var timeLeft = 70;
        var timerId = null;
        var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        var canvas = document.getElementById('canvas-bg');
        var ctx = canvas.getContext('2d');
        var silent = document.getElementById('silent');

        // Fills the canvas with a tiny bit of "noise" 60 times a second
        // This is the ONLY thing that stops an iPhone 7 from sleeping in LPM
        function renderBypass() {
            ctx.fillStyle = "rgb(" + (Math.random() * 5) + ",0,0)"; // Nearly black but technically moving
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            requestAnimationFrame(renderBypass);
        }

        function playSynth() {
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            osc.start();
            return osc;
        }

        function engageNuclearBypass() {
            audioCtx.resume();
            silent.play(); // Keeps the audio channel alive
            document.getElementById('startBtn').style.display = 'none';

            // Start the visual GPU bypass
            renderBypass();

            var endTime = Date.now() + (timeLeft * 1000);

            timerId = setInterval(function() {
                var remaining = Math.round((endTime - Date.now()) / 1000);

                if (remaining <= 0) {
                    clearInterval(timerId);
                    triggerAlarm();
                } else {
                    var m = Math.floor(remaining / 60);
                    var s = remaining % 60;
                    document.getElementById('timer').innerText = m + ":" + (s < 10 ? '0' : '') + s;
                }
            }, 500);
        }

        function triggerAlarm() {
            document.getElementById('timer').innerText = "0:00";
            document.getElementById('timer').style.color = "#FF3B30";
            document.getElementById('stopBtn').style.display = 'block';
            
            // Continuous beeping loop
            setInterval(function() {
                var t = playSynth();
                setTimeout(function() { t.stop(); }, 200);
            }, 400);
        }
    </script>
</body>
</html>
