<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>70s Audio Bypass</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; justify-content: center; overflow: hidden; }
        #timer { font-size: 100px; font-weight: bold; color: #34C759; margin-bottom: 20px; font-variant-numeric: tabular-nums; }
        .btn { padding: 25px; width: 90%; font-size: 20px; border-radius: 20px; border: none; font-weight: bold; margin: 10px auto; cursor: pointer; }
        #testBtn { background: #444; color: white; }
        #startBtn { background: #007AFF; color: white; }
        #stopBtn { background: #FF3B30; color: white; display: none; }
        .status { color: #888; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="timer">01:10</div>

    <div id="setup">
        <button id="testBtn" class="btn" onclick="testTone()">1. TEST SOUND</button>
        <button id="startBtn" class="btn" onclick="startSystem()">2. START 70s ALARM</button>
    </div>
    
    <button id="stopBtn" class="btn" onclick="location.reload()">STOP ALARM</button>

    <div class="status" id="stat">Status: Waiting...</div>

    <audio id="silentLoop" src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3" loop></audio>

    <script>
        var timeLeft = 70;
        var timerId = null;
        var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        var silent = document.getElementById('silentLoop');

        function createTone() {
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            return { osc, gain };
        }

        function testTone() {
            audioCtx.resume();
            var t = createTone();
            t.osc.start();
            setTimeout(() => t.osc.stop(), 500);
            document.getElementById('stat').innerText = "Sound Tested!";
        }

        function startSystem() {
            audioCtx.resume();
            document.getElementById('setup').style.display = 'none';
            document.getElementById('stat').innerText = "Bypass Active: App will run even if screen turns off.";

            // START SILENT MUSIC IMMEDIATELY
            // This is the only thing that keeps the iPhone 7 from freezing
            silent.play();

            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({ title: "70s Alarm Running" });
            }

            var endTime = Date.now() + (timeLeft * 1000);

            timerId = setInterval(() => {
                var remaining = Math.round((endTime - Date.now()) / 1000);

                if (remaining <= 0) {
                    clearInterval(timerId);
                    triggerAlarm();
                } else {
                    var m = Math.floor(remaining / 60);
                    var s = remaining % 60;
                    document.getElementById('timer').innerText = m + ":" + (s < 10 ? '0' : '') + s;
                }
            }, 500);
        }

        function triggerAlarm() {
            document.getElementById('timer').innerText = "0:00";
            document.getElementById('timer').style.color = "#FF3B30";
            document.getElementById('stopBtn').style.display = 'block';
            
            // Continuous beep loop
            setInterval(() => {
                var t = createTone();
                t.osc.start();
                setTimeout(() => t.osc.stop(), 200);
            }, 400);

            // Vibrate if available
            if (navigator.vibrate) navigator.vibrate([500, 500, 500]);
        }
    </script>
</body>
</html>
