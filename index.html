<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>70s Verified Alarm</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        #timer { font-size: 100px; font-weight: 300; color: #a8e6cf; margin-bottom: 20px; }
        .btn { padding: 25px; width: 85%; font-size: 20px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin: 10px auto; }
        #startBtn { background: #34C759; color: white; display: none; }
        #stopBtn { background: #444; color: white; display: none; }
        #testBtn { background: #007AFF; color: white; margin-bottom: 20px; }
        
        /* Global Checklist Overlay */
        #setup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .step-card { background: #1c1c1e; padding: 30px; border-radius: 25px; width: 95%; max-width: 400px; border: 1px solid #333; }
        .checkbox-row { display: flex; align-items: center; text-align: left; margin: 15px 0; font-size: 16px; line-height: 1.4; }
        input[type="checkbox"] { width: 28px; height: 28px; margin-right: 15px; flex-shrink: 0; }
        
        .iphone-only { display: none; } /* Hidden by default, shown via JS */
        #hint { font-size: 12px; color: #555; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="step-card">
            <h2 id="setup-title">System Check</h2>
            
            <button id="testBtn" class="btn" onclick="testTone()">1. PLAY TEST SOUND</button>

            <div class="checkbox-row">
                <input type="checkbox" id="check-hear" onchange="verify()">
                <label for="check-hear">I can hear the <b>Test Sound</b></label>
            </div>

            <div id="ios-items" class="iphone-only">
                <div class="checkbox-row">
                    <input type="checkbox" id="check-lock" onchange="verify()">
                    <label for="check-lock">Auto-Lock is set to <b>"Never"</b></label>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="check-sound" onchange="verify()">
                    <label for="check-sound">Side Switch is <b>UP</b> (Not Silent)</label>
                </div>
            </div>

            <p id="hint">Check all boxes to enable the timer.</p>
            <button id="startBtn" class="btn" onclick="startAlarm()">START 70s ALARM</button>
        </div>
    </div>

    <div id="timer">01:10</div>
    <button id="stopBtn" class="btn" onclick="location.reload()">STOP ALARM</button>

    <audio id="silent" src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" loop></audio>

    <script>
        var timeLeft = 70;
        var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
        
        // --- DEVICE DETECTION ---
        if (isIOS) {
            document.querySelectorAll('.iphone-only').forEach(el => el.style.display = 'block');
            document.getElementById('setup-title').innerText = "iPhone 7 Pre-Flight";
        }

        function verify() {
            var canHear = document.getElementById('check-hear').checked;
            var startBtn = document.getElementById('startBtn');
            
            if (isIOS) {
                var lockOff = document.getElementById('check-lock').checked;
                var soundOn = document.getElementById('check-sound').checked;
                startBtn.style.display = (canHear && lockOff && soundOn) ? "block" : "none";
            } else {
                startBtn.style.display = canHear ? "block" : "none";
            }
        }

        function testTone() {
            audioCtx.resume();
            playGentleChime();
        }

        function playGentleChime() {
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5

            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);

            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        function startAlarm() {
            audioCtx.resume();
            document.getElementById('silent').play();
            document.getElementById('setup-overlay').style.display = "none";

            var endTime = Date.now() + (timeLeft * 1000);

            var timerId = setInterval(function() {
                var remaining = Math.round((endTime - Date.now()) / 1000);

                if (remaining <= 0) {
                    clearInterval(timerId);
                    triggerAlarm();
                } else {
                    var m = Math.floor(remaining / 60);
                    var s = remaining % 60;
                    document.getElementById('timer').innerText = m + ":" + (s < 10 ? '0' : '') + s;
                }
            }, 500);
        }

        function triggerAlarm() {
            document.getElementById('timer').innerText = "0:00";
            document.getElementById('timer').style.color = "#FFB347";
            document.getElementById('stopBtn').style.display = "block";
            
            // Loop the chime every 2 seconds
            setInterval(playGentleChime, 2000);
        }
    </script>
</body>
</html>
