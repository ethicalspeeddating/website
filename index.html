<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 7 Alarm</title>
    <style>
        body { background: #1a1a1a; color: #fff; text-align: center; font-family: sans-serif; padding-top: 100px; }
        #timer { font-size: 60px; margin: 20px; color: #00ff00; }
        button { padding: 30px; font-size: 20px; background: #007AFF; color: white; border: none; border-radius: 15px; }
        .dot { height: 10px; width: 100px; background-color: #333; margin: auto; border-radius: 5px; }
        .pulse { background-color: #ff0000; } /* Flashes to show it's working */
    </style>
</head>
<body>

    <div id="setup">
        <button onclick="startTimer()">START 5-MIN ALARM</button>
        <p>Keep screen visible after clicking.</p>
    </div>

    <div id="running" style="display:none;">
        <div id="timer">05:00</div>
        <div id="indicator" class="dot"></div>
        <p style="color:#555">App is Active. Do not lock phone.</p>
    </div>

    <video id="v" playsinline loop muted style="width:1px;height:1px;opacity:0.01;">
        <source src="https://raw.githubusercontent.com/bower-media-samples/big-buck-bunny-480p-30s/master/video.mp4" type="video/mp4">
    </video>
    <audio id="a" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        var timeLeft = 300;
        var video = document.getElementById('v');
        var audio = document.getElementById('a');
        var indicator = document.getElementById('indicator');

        function startTimer() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('running').style.display = 'block';

            // Start Video (Forces iPhone 7 to stay awake)
            video.play();
            
            // Unlock Audio
            audio.play(); audio.pause();

            setInterval(function() {
                timeLeft--;
                
                // Pulse the indicator so you know it hasn't frozen
                indicator.classList.toggle('pulse');

                var m = Math.floor(timeLeft / 60);
                var s = timeLeft % 60;
                document.getElementById('timer').innerHTML = m + ":" + (s < 10 ? '0' : '') + s;

                if (timeLeft <= 0) {
                    audio.play();
                    timeLeft = 300; // Reset to 5 mins
                }
            }, 1000);
        }
    </script>
</body>
</html>
