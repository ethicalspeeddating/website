<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: -apple-system, sans-serif; padding-top: 50px; }
        #timer { font-size: 90px; font-weight: bold; color: #00ff00; margin: 20px; }
        .btn { padding: 25px; width: 85%; font-size: 20px; border-radius: 20px; border: none; font-weight: bold; margin: 10px 0; }
        #testBtn { background: #444; color: #fff; }
        #startBtn { background: #007AFF; color: #fff; }
        #stopBtn { background: #FF3B30; color: #fff; display: none; }
        .warning { color: #FF9500; padding: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="timer">01:10</div>

    <div class="warning">
        <b>IPHONE 7 RULES:</b><br>
        1. Flip the side switch <b>UP</b> (No Red showing).<br>
        2. Turn volume to <b>MAX</b>.
    </div>

    <button id="testBtn" class="btn" onclick="test()">1. TEST SOUND</button>
    <button id="startBtn" class="btn" onclick="start()">2. START ALARM</button>
    <button id="stopBtn" class="btn" onclick="location.reload()">STOP ALARM</button>

    <audio id="alarm" src="https://www.soundjay.com/buttons/beep-01a.mp3" loop preload="auto"></audio>
    <audio id="silent" src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" loop></audio>

    <script>
        var timer = 70;
        var alarm = document.getElementById('alarm');
        var silent = document.getElementById('silent');

        function test() {
            // This "primes" the audio hardware
            alarm.play().then(function() {
                setTimeout(function() { 
                    alarm.pause(); 
                    alarm.currentTime = 0;
                    alert("Sound works! If you heard nothing, check your side switch.");
                }, 1000);
            }).catch(function(e) { alert("Click again - iOS blocked it."); });
        }

        function start() {
            // Play silent loop immediately to keep the audio channel open
            silent.play();
            
            document.getElementById('testBtn').style.display = 'none';
            document.getElementById('startBtn').style.display = 'none';

            var endTime = Date.now() + (timer * 1000);
            
            var countdown = setInterval(function() {
                var remaining = Math.round((endTime - Date.now()) / 1000);
                
                if (remaining <= 0) {
                    clearInterval(countdown);
                    document.getElementById('timer').innerHTML = "0:00";
                    document.getElementById('timer').style.color = "red";
                    document.getElementById('stopBtn').style.display = "block";
                    silent.pause();
                    alarm.play(); // This will now work because 'silent' held the channel open
                } else {
                    var m = Math.floor(remaining / 60);
                    var s = remaining % 60;
                    document.getElementById('timer').innerHTML = m + ":" + (s < 10 ? '0' : '') + s;
                }
            }, 500);
        }
    </script>
</body>
</html>
