<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>70s Synth Alarm</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; justify-content: center; }
        #timer { font-size: 100px; font-weight: bold; color: #34C759; margin-bottom: 20px; }
        .btn { padding: 25px; width: 90%; font-size: 20px; border-radius: 20px; border: none; font-weight: bold; margin: 10px auto; cursor: pointer; }
        #testBtn { background: #444; color: white; }
        #startBtn { background: #007AFF; color: white; }
        #stopBtn { background: #FF3B30; color: white; display: none; }
        #install-note { background: #1c1c1e; padding: 15px; border-radius: 15px; font-size: 13px; color: #888; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="timer">01:10</div>

    <div id="ui">
        <div id="install-note">
            <b>REQUIRED:</b> Tap <b>Share</b> > <b>Add to Home Screen</b>. <br>The alarm will NOT work inside the Safari app.
        </div>
        <button id="testBtn" class="btn" onclick="testTone()">1. TEST LOUD TONE</button>
        <button id="startBtn" class="btn" onclick="startAlarm()">2. START 70s TIMER</button>
    </div>
    
    <button id="stopBtn" class="btn" onclick="location.reload()">STOP ALARM</button>

    <script>
        var timeLeft = 70;
        var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        var timerId = null;

        // Bypasses the silent switch by generating a raw electronic wave
        function playTone() {
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square'; // Harsh, loud sound
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // High pitch A
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            osc.start();
            return { osc, gain };
        }

        function testTone() {
            audioCtx.resume();
            var tone = playTone();
            setTimeout(() => tone.osc.stop(), 500);
        }

        function startAlarm() {
            audioCtx.resume();
            document.getElementById('ui').style.display = 'none';

            // Create a "Silent Heartbeat" to keep iOS from sleeping the CPU
            var silentOsc = audioCtx.createOscillator();
            var silentGain = audioCtx.createGain();
            silentGain.gain.setValueAtTime(0.001, audioCtx.currentTime);
            silentOsc.connect(silentGain);
            silentGain.connect(audioCtx.destination);
            silentOsc.start();

            var endTime = Date.now() + (timeLeft * 1000);

            timerId = setInterval(() => {
                var now = Date.now();
                var remaining = Math.round((endTime - now) / 1000);

                if (remaining <= 0) {
                    clearInterval(timerId);
                    triggerAlarm();
                } else {
                    var m = Math.floor(remaining / 60);
                    var s = remaining % 60;
                    document.getElementById('timer').innerText = m + ":" + (s < 10 ? '0' : '') + s;
                }
            }, 500);
        }

        function triggerAlarm() {
            document.getElementById('timer').innerText = "0:00";
            document.getElementById('timer').style.color = "#FF3B30";
            document.getElementById('stopBtn').style.display = 'block';
            
            // Continuous beeping loop
            setInterval(() => {
                var t = playTone();
                setTimeout(() => t.osc.stop(), 200);
            }, 400);
        }
    </script>
</body>
</html>
