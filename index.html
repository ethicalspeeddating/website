<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite Timer</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: -apple-system, sans-serif; padding-top: 20%; }
        #timer { font-size: 80px; font-weight: bold; margin: 20px 0; }
        button { padding: 20px 40px; font-size: 20px; border-radius: 15px; border: none; background: #007AFF; color: white; }
        #status { color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="setup">
        <input type="number" id="mins" value="5" style="font-size:30px; width:60px; text-align:center;"> Mins<br><br>
        <button id="startBtn">START ALARM</button>
    </div>

    <div id="display" style="display:none;">
        <div id="timer">05:00</div>
        <div id="status">Screen Lock Active</div>
    </div>

    <video id="wakeVideo" playsinline loop muted style="position:absolute; width:1px; height:1px; opacity:0.01;">
        <source src="https://raw.githubusercontent.com/bower-media-samples/big-buck-bunny-480p-30s/master/video.mp4" type="video/mp4">
    </video>
    <audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        const startBtn = document.getElementById('startBtn');
        const timerText = document.getElementById('timer');
        const video = document.getElementById('wakeVideo');
        const audio = document.getElementById('alarm');

        let timeLeft = 0;

        startBtn.onclick = () => {
            timeLeft = document.getElementById('mins').value * 60;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('display').style.display = 'block';

            // 1. Force the video and audio to "Unlock"
            video.play().catch(e => console.log("Video wait"));
            audio.play(); audio.pause();

            // 2. Simple Wake Lock (If supported)
            if (navigator.wakeLock) {
                navigator.wakeLock.request('screen').catch(() => {});
            }

            // 3. The Countdown (Separated so it doesn't freeze)
            const countdown = setInterval(() => {
                timeLeft--;
                
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                timerText.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;

                if (timeLeft <= 0) {
                    audio.play();
                    timeLeft = document.getElementById('mins').value * 60; // Reset
                    if (navigator.vibrate) navigator.vibrate(500);
                }
            }, 1000);
        };
    </script>
</body>
</html>
