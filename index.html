<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>70s Audio Bypass</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; justify-content: center; }
        #timer { font-size: 100px; font-weight: bold; color: #34C759; margin-bottom: 20px; }
        .btn { padding: 20px; width: 90%; font-size: 20px; border-radius: 15px; border: none; font-weight: bold; margin: 10px auto; cursor: pointer; }
        #testBtn { background: #555; color: white; }
        #startBtn { background: #007AFF; color: white; }
        #stopBtn { background: #FF3B30; color: white; display: none; }
        #status { color: #ff9500; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="timer">01:10</div>

    <div id="controls">
        <button id="testBtn" class="btn" onclick="testSound()">1. TEST SOUND</button>
        <button id="startBtn" class="btn" onclick="startAlarm()">2. START ALARM</button>
    </div>
    
    <button id="stopBtn" class="btn" onclick="location.reload()">STOP & RESET</button>
    <div id="status">Status: Waiting...</div>

    <audio id="silentLoop" src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" loop></audio>
    <audio id="alarmSnd" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop></audio>

    <script>
        var timeLeft = 70;
        var silent = document.getElementById('silentLoop');
        var alarm = document.getElementById('alarmSnd');
        var timerText = document.getElementById('timer');
        var statusText = document.getElementById('status');

        // Play a quick beep to check volume
        function testSound() {
            alarm.play();
            statusText.innerText = "Beeping... Check your volume!";
            setTimeout(function() { 
                alarm.pause(); 
                alarm.currentTime = 0;
                statusText.innerText = "Test Done. Now click Start.";
            }, 1000);
        }

        function startAlarm() {
            // 1. Immediately play silence. This tricks iOS into 
            // keeping the audio channel open even when screen turns off.
            silent.play();
            
            // 2. Register Media Session (Essential for Background Audio)
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({ title: "Alarm Active" });
                navigator.mediaSession.playbackState = 'playing';
            }

            document.getElementById('controls').style.display = 'none';
            statusText.innerText = "ALARM SET. Sound will play at 0:00.";

            // 3. Use real-time clock to avoid drift if the phone sleeps
            var endTime = Date.now() + (timeLeft * 1000);

            var checkTimer = setInterval(function() {
                var now = Date.now();
                var remaining = Math.round((endTime - now) / 1000);

                if (remaining <= 0) {
                    clearInterval(checkTimer);
                    triggerAlarm();
                } else {
                    var m = Math.floor(remaining / 60);
                    var s = remaining % 60;
                    timerText.innerText = m + ":" + (s < 10 ? '0' : '') + s;
                }
            }, 500);
        }

        function triggerAlarm() {
            timerText.innerText = "0:00";
            timerText.style.color = "#FF3B30";
            document.getElementById('stopBtn').style.display = 'block';
            
            // Swap silence for the alarm
            silent.pause();
            alarm.play();
            
            if (navigator.vibrate) navigator.vibrate([500, 500, 500]);
        }
    </script>
</body>
</html>
