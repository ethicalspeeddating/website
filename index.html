<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Bypass Alarm</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: center; }
        #timer { font-size: 100px; font-weight: bold; color: #34C759; margin-bottom: 20px; }
        .btn { padding: 25px; width: 80%; font-size: 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        #startBtn { background: #007AFF; color: white; }
        #stopBtn { background: #FF3B30; color: white; display: none; }
        
        /* The Instruction Overlay */
        #install-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .instruction-card { background: #1c1c1e; padding: 30px; border-radius: 25px; border: 1px solid #333; width: 90%; max-width: 400px; }
        .icon-box { font-size: 40px; margin-bottom: 10px; }
        b { color: #007AFF; }
    </style>
</head>
<body>

    <div id="install-overlay">
        <div class="instruction-card">
            <div class="icon-box">📲</div>
            <h2>Install to Bypass Sleep</h2>
            <p>To keep the alarm running in <b>Low Power Mode</b>, you must add this to your Home Screen:</p>
            <p>1. Tap the <b>Share icon</b> <br>(square with arrow at bottom)</p>
            <p>2. Select <b>"Add to Home Screen"</b></p>
            <p>3. Open the app from your home screen!</p>
        </div>
    </div>

    <div id="main-ui">
        <div id="timer">05:00</div>
        <button id="startBtn" class="btn" onclick="startAlarm()">START BYPASS ALARM</button>
        <button id="stopBtn" class="btn" onclick="stopAlarm()">STOP ALARM</button>
    </div>

    <video id="v" playsinline loop muted style="position:absolute; width:1px; height:1px; opacity:0.01;">
        <source src="https://raw.githubusercontent.com/bower-media-samples/big-buck-bunny-480p-30s/master/video.mp4" type="video/mp4">
    </video>
    <audio id="a" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop></audio>

    <script>
        const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

        // Show overlay if on iPhone and not installed
        if (isIOS && !isStandalone) {
            document.getElementById('install-overlay').style.display = 'flex';
        }

        let timeLeft = 70;
        let timerId = null;
        const v = document.getElementById('v');
        const a = document.getElementById('a');

        function startAlarm() {
            // Start video loop to bypass Auto-Lock
            v.play();
            
            // Register Media Session to bypass Low Power Mode throttling
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: "Active 5-Min Alarm",
                    artist: "System Bypass"
                });
            }

            // Unlock audio
            a.play(); a.pause();

            document.getElementById('startBtn').style.display = 'none';
            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                } else {
                    triggerAlarm();
                }
            }, 1000);
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function triggerAlarm() {
            document.getElementById('timer').innerText = "0:00";
            document.getElementById('timer').style.color = "#FF3B30";
            document.getElementById('stopBtn').style.display = 'inline-block';
            a.play(); // Infinite loop
        }

        function stopAlarm() {
            location.reload(); // Quickest way to reset the bypass and stop sound
        }
    </script>
</body>
</html>
