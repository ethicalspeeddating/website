<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>70s Pro Alarm</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: center; }
        #timer { font-size: 100px; font-weight: bold; color: #34C759; margin-bottom: 20px; }
        .btn { padding: 30px; width: 80%; font-size: 24px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
        #startBtn { background: #007AFF; color: white; }
        #stopBtn { background: #FF3B30; color: white; display: none; }
        #status { font-size: 12px; color: #444; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="timer">01:10</div>
    <button id="startBtn" class="btn" onclick="startBypass()">START ALARM</button>
    <button id="stopBtn" class="btn" onclick="stopAlarm()">STOP ALARM</button>
    <div id="status">Bypass: Inactive</div>

    <audio id="heartbeat" src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" loop></audio>
    <audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" loop></audio>

    <script>
        var timeLeft = 70;
        var timerId = null;
        var heartbeat = document.getElementById('heartbeat');
        var alarm = document.getElementById('alarm');
        var timerText = document.getElementById('timer');

        function startBypass() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').innerText = "BYPASS ACTIVE: DO NOT LOCK";

            // 1. Start Silent "Music" Heartbeat (The real bypass)
            heartbeat.play();
            
            // 2. Set Media Metadata (Tells iOS this is a high-priority task)
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = 'playing';
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: "70s Alarm Running",
                    artist: "Power Bypass"
                });
            }

            // 3. Start Timer
            timerId = setInterval(function() {
                if (timeLeft > 0) {
                    timeLeft--;
                    var m = Math.floor(timeLeft / 60);
                    var s = timeLeft % 60;
                    timerText.innerText = m + ":" + (s < 10 ? '0' : '') + s;
                } else {
                    trigger();
                }
            }, 1000);
        }

        function trigger() {
            timerText.innerText = "0:00";
            timerText.style.color = "#FF3B30";
            document.getElementById('stopBtn').style.display = 'inline-block';
            alarm.play(); // Infinite beeping
            heartbeat.pause(); // Switch from silence to alarm
        }

        function stopAlarm() {
            location.reload(); // Hard reset for iPhone 7 stability
        }
    </script>
</body>
</html>
